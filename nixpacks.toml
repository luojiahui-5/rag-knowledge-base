# Railway build config
[phases.setup]
nixPkgs = ["nodejs", "python311"]

[phases.install]
cmds = [
    "pip3 install -r backend/requirements.txt",
    "npm install",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
