<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业级智能知识库系统 - 登录</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif}
.login-page{display:flex;width:100vw;height:100vh;overflow:hidden;background:linear-gradient(160deg,#060b1f 0%,#0a1030 30%,#0d1538 60%,#091028 100%)}

/* ===== 左侧 ===== */
.left-panel{position:relative;width:42%;height:100%;display:flex;flex-direction:column;align-items:center;padding:44px 40px 0;overflow:hidden;flex-shrink:0}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,180,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 70%);pointer-events:none}
.particles{position:absolute;inset:0;pointer-events:none}
.particle{position:absolute;border-radius:50%;background:#00d4ff;box-shadow:0 0 6px 2px rgba(0,212,255,.4);animation:floatUp 6s ease-in-out infinite}
@keyframes floatUp{0%,100%{transform:translateY(0) scale(1);opacity:.2}50%{transform:translateY(-30px) scale(1.8);opacity:.7}}

.brand-header{position:relative;z-index:2;text-align:center;margin-top:12px}
.brand-icon{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;margin-bottom:20px;background:rgba(0,180,255,.08);border-radius:14px;border:1px solid rgba(0,200,255,.2)}
.brand-icon-svg{width:36px;height:36px}
.brand-title{font-size:28px;font-weight:700;letter-spacing:2px;color:#fff;margin:0 0 10px;text-shadow:0 0 30px rgba(0,200,255,.3)}
.brand-subtitle{font-size:14px;font-weight:300;letter-spacing:3px;color:rgba(255,255,255,.55);margin:0}

.feature-grid{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:420px;margin-top:38px}
.feature-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;transition:background .3s,border-color .3s;cursor:default}
.feature-card:hover{background:rgba(255,255,255,.06);border-color:rgba(0,200,255,.25)}
.feature-icon{flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(0,200,255,.1);border-radius:8px;color:#00d4ff}
.feature-icon svg{width:20px;height:20px}
.feature-title{font-size:13px;font-weight:600;color:#e2e8f0;line-height:1.4}
.feature-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.4;margin-top:1px}

.globe-wrapper{position:relative;width:250px;height:250px;margin-top:auto;margin-bottom:36px;z-index:2;flex-shrink:0}
.globe{position:absolute;inset:26px;border-radius:50%;overflow:hidden}
.globe-grid{position:absolute;inset:0;border-radius:50%;background:repeating-linear-gradient(0deg,transparent,transparent 14px,rgba(0,180,255,.12) 14px,rgba(0,180,255,.12) 15px),repeating-linear-gradient(90deg,transparent,transparent 14px,rgba(0,180,255,.12) 14px,rgba(0,180,255,.12) 15px);mask-image:radial-gradient(circle at 50% 50%,black 55%,transparent 95%)}
.globe-glow{position:absolute;inset:-40px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(0,200,255,.15) 0%,rgba(0,150,255,.05) 40%,transparent 70%);filter:blur(20px);pointer-events:none}
.orbit{position:absolute;border:1px solid rgba(0,200,255,.18);border-radius:50%;pointer-events:none}
.orbit-1{inset:0;transform:rotateX(70deg)}
.orbit-2{inset:-12px;transform:rotateX(50deg) rotateY(30deg)}
.orbit-3{inset:-6px;transform:rotateX(75deg) rotateY(-20deg)}
.globe-dots{position:absolute;inset:26px}
.globe-dot{position:absolute;width:3px;height:3px;border-radius:50%;background:#00e5ff;box-shadow:0 0 6px 2px rgba(0,220,255,.6);animation:dotPulse 3s ease-in-out infinite}
@keyframes dotPulse{0%,100%{transform:scale(1);box-shadow:0 0 6px 2px rgba(0,220,255,.6)}50%{transform:scale(2);box-shadow:0 0 12px 4px rgba(0,220,255,.9)}}

/* ===== 右侧 ===== */
.right-panel{width:58%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.login-card{width:424px;max-width:90%;background:#fff;border-radius:16px;padding:40px 44px 34px;box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);border:1px solid #edf0f4}
.login-title{font-size:24px;font-weight:700;color:#1a1a2e;text-align:center;margin:0 0 6px}
.login-subtitle{font-size:13px;color:#9099a8;text-align:center;margin:0 0 30px}
.login-form{display:flex;flex-direction:column}
.input-group{margin-bottom:18px}
.input-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
.input-wrapper{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#a0aec0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1}
.input-icon svg{width:18px;height:18px}
.form-input{width:100%;height:46px;padding:0 16px 0 42px;font-size:14px;color:#1a1a2e;background:#f5f6f8;border:1px solid #e8ecf1;border-radius:10px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.form-input::placeholder{color:#b0b8c4}
.form-input:focus{border-color:#4a8cf7;box-shadow:0 0 0 3px rgba(74,140,247,.1)}

.form-options{display:flex;justify-content:space-between;align-items:center;margin:4px 0 22px}
.remember-me{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.checkbox{display:none}
.checkmark{width:16px;height:16px;border:1.5px solid #cfd7e2;border-radius:4px;background:#f5f6f8;transition:all .2s;flex-shrink:0;position:relative}
.checkbox:checked+.checkmark{background:#4a8cf7;border-color:#4a8cf7}
.checkbox:checked+.checkmark::after{content:'';position:absolute;left:4px;top:1px;width:5px;height:9px;border:2px solid #fff;border-top:none;border-right:none;transform:rotate(-45deg)}
.remember-text{font-size:13px;color:#6b7280}
.forgot-link{font-size:13px;color:#4a8cf7;text-decoration:none}
.forgot-link:hover{color:#3b7de6}

.login-btn{width:100%;height:46px;border:none;border-radius:10px;background:linear-gradient(135deg,#4a6cf7 0%,#5b8cf7 40%,#4ab8d4 100%);color:#fff;font-size:16px;font-weight:600;letter-spacing:6px;cursor:pointer;transition:opacity .2s,transform .15s;font-family:inherit}
.login-btn:hover{opacity:.92}
.login-btn:active{transform:scale(.99)}

.register-hint{text-align:center;font-size:13px;color:#9099a8;margin:20px 0 0}
.register-link{color:#4a8cf7;text-decoration:none;font-weight:500;margin-left:2px}
.register-link:hover{color:#3b7de6}

.card-footer{display:flex;justify-content:center;align-items:center;gap:16px;margin-top:24px;padding-top:18px;border-top:1px solid #f2f4f7}
.footer-link{font-size:12px;color:#b0b8c4;text-decoration:none}
.footer-link:hover{color:#6b7280}
.footer-divider{color:#e0e4ea;font-size:12px}

.copyright{position:absolute;bottom:28px;font-size:12px;color:rgba(255,255,255,.35);text-align:center}

@media(max-width:1024px){.left-panel{width:44%;padding:36px 28px 0}.right-panel{width:56%}.brand-title{font-size:24px}.login-card{width:370px;padding:32px 34px 28px}}
@media(max-width:768px){.login-page{flex-direction:column}.left-panel{display:none}.right-panel{width:100%}.login-card{width:92%;max-width:400px}}
</style>
</head>
<body>
<div id="app">
  <div class="login-page">
    <!-- ===== 左侧 ===== -->
    <div class="left-panel">
      <div class="grid-bg"></div>
      <div class="particles">
        <span v-for="i in 20" :key="i" class="particle" :style="pStyle(i)"></span>
      </div>
      <div class="brand-header">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" class="brand-icon-svg">
            <rect x="4" y="4" width="32" height="32" rx="8" stroke="url(#iconGrad)" stroke-width="2" fill="none"/>
            <circle cx="20" cy="14" r="5" fill="url(#iconGrad)" opacity="0.8"/>
            <path d="M10 28 L20 22 L30 28" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
            <path d="M13 31 L20 26 L27 31" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <defs><linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#0066ff"/></linearGradient></defs>
          </svg>
        </div>
        <h1 class="brand-title">企业级智能知识库系统</h1>
        <p class="brand-subtitle">基于 RAG 技术的新一代智能知识管理平台</p>
      </div>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
          <div><div class="feature-title">智能检索</div><div class="feature-desc">语义级精准搜索</div></div>
        </div>
        <div class="feature-card">
          <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="5" cy="19" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="19" cy="19" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M12 7v3" stroke="currentColor" stroke-width="1.5"/><path d="M7.5 10L6 17" stroke="currentColor" stroke-width="1.5"/><path d="M16.5 10L18 17" stroke="currentColor" stroke-width="1.5"/></svg></div>
          <div><div class="feature-title">知识图谱</div><div class="feature-desc">多维度关联挖掘</div></div>
        </div>
        <div class="feature-card">
          <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 21v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12 21v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 21v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
          <div><div class="feature-title">RAG 增强</div><div class="feature-desc">大模型私有化部署</div></div>
        </div>
        <div class="feature-card">
          <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z" stroke="currentColor" stroke-width="1.5"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div><div class="feature-title">安全可靠</div><div class="feature-desc">企业级权限管控</div></div>
        </div>
      </div>
      <div class="globe-wrapper">
        <div class="globe"><div class="globe-grid"></div><div class="globe-glow"></div></div>
        <div class="orbit orbit-1"></div><div class="orbit orbit-2"></div><div class="orbit orbit-3"></div>
        <div class="globe-dots"><span v-for="i in 8" :key="i" class="globe-dot" :style="dStyle(i)"></span></div>
      </div>
    </div>

    <!-- ===== 右侧 ===== -->
    <div class="right-panel">
      <div class="login-card">
        <h2 class="login-title">欢迎登录</h2>
        <p class="login-subtitle">请使用您的企业账号登录系统</p>
        <div class="login-form">
          <div class="input-group">
            <label class="input-label">邮箱地址</label>
            <div class="input-wrapper">
              <span class="input-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="2.5" y="4.5" width="15" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 5l7.5 6 7.5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <input type="email" class="form-input" placeholder="请输入您的企业邮箱"/>
            </div>
          </div>
          <div class="input-group">
            <label class="input-label">登录密码</label>
            <div class="input-wrapper">
              <span class="input-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="4" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="13" r="1.2" fill="currentColor"/></svg></span>
              <input type="password" class="form-input" placeholder="请输入您的登录密码"/>
            </div>
          </div>
          <div class="form-options">
            <label class="remember-me" @click="remember=!remember">
              <input type="checkbox" class="checkbox" v-model="remember"/>
              <span class="checkmark"></span>
              <span class="remember-text">记住我</span>
            </label>
            <a href="#" class="forgot-link">忘记密码？</a>
          </div>
          <button class="login-btn" @click.prevent>登 录</button>
          <p class="register-hint">还没有账号？<a href="#" class="register-link">立即注册</a></p>
        </div>
        <div class="card-footer">
          <a href="#" class="footer-link">使用条款</a><span class="footer-divider">|</span>
          <a href="#" class="footer-link">隐私政策</a><span class="footer-divider">|</span>
          <a href="#" class="footer-link">帮助中心</a>
        </div>
      </div>
      <p class="copyright">© 2025 企业级智能知识库系统. All rights reserved.</p>
    </div>
  </div>
</div>
<script>
const { createApp } = Vue
createApp({data(){return{remember:false}},methods:{pStyle(i){return{top:((i*17+3)%100)+'%',left:((i*23+7)%100)+'%',width:(2+(i%4))+'px',height:(2+(i%4))+'px',animationDelay:((i*0.7)%5)+'s',opacity:0.15+(i%5)*0.1}},dStyle(i){const a=(i/8)*360*Math.PI/180,r=38+(i%3)*6;return{top:(50+Math.sin(a)*r/100*50)+'%',left:(50+Math.cos(a)*r/100*50)+'%',animationDelay:(i*0.3)+'s'}}}}).mount('#app')
</script>
</body>
</html>
